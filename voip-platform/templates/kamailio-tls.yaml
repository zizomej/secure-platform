apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: voip-selfsigned-issuer
  namespace: {{ .Values.namespace }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kamailio-tls
  namespace: {{ .Values.namespace }}
spec:
  secretName: kamailio-tls-secret
  duration: 8760h
  renewBefore: 720h
  subject:
    organizations:
      - VoIP-Platform
  commonName: kamailio.voip.local
  dnsNames:
    - kamailio.voip.local
    - kamailio
  ipAddresses:
    - 192.168.239.150
  issuerRef:
    name: voip-selfsigned-issuer
    kind: Issuer
