#!KAMAILIO

####### Paramètres globaux #######
debug=2
log_stderror=yes
fork=yes
children=4

# Écoute sur toutes les interfaces, port 5060 UDP
listen=udp:0.0.0.0:5070

####### Modules #######
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"

####### Configuration des modules #######
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 0)

####### Adresse d'Asterisk (le PBX derrière Kamailio) #######
#!define ASTERISK "sip:192.168.239.150:5060"

####### Routage principal #######
request_route {

    # Filtrage basique : rejeter les requêtes malformées
    if (!sanity_check("1511", "7")) {
        xlog("L_WARN", "Requete malformee de $si:$sp\n");
        exit;
    }

    # Gérer les retransmissions
    if (!is_method("ACK")) {
        if (t_check_trans()) {
            t_relay();
            exit;
        }
    }

    # Gérer le Record-Route pour rester dans le chemin des requêtes
    if (has_totag()) {
        if (loose_route()) {
            route(RELAY);
            exit;
        }
    }

    # Enregistrement du Record-Route
    record_route();

    # Relayer toutes les requêtes vers Asterisk
    xlog("L_INFO", "Relais vers Asterisk : $rm de $fu vers $tu\n");
    $du = ASTERISK;
    route(RELAY);
}

####### Route de relais #######
route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}
